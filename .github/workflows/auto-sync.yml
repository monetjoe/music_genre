name: auto-sync

on:
  push:
    branches:
      - main

  workflow_dispatch: # 允许手动触发

permissions:
  contents: read

jobs:
  job-on-push:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      # Step 1: 检出当前仓库代码
      - name: Checkout repository
        uses: actions/checkout@v5
      # Step 2: 同步至 ModelScope
      - name: Sync Files to ModelScope
        env:
          MS_TOKEN: ${{ secrets.MS_TOKEN }}
        run: |
          mv -f ./.github/restart.py ../
          git clone https://oauth2:$MS_TOKEN@www.modelscope.cn/studios/ccmusic-database/music_genre.git ../ms_repo
          rm -rf ./.git* ./LICENSE ./README.md
          cp -rf ../ms_repo/.git ../ms_repo/requirements.txt ./
          if [ -n "$(git status --porcelain)" ]; then
            echo "Files are different, committing changes..."
            git config --global user.name "${{ secrets.GIT_NAME }}"
            git config --global user.email "${{ secrets.GIT_EMAIL }}"
            git add .
            git commit -m "Auto sync at $(date '+%Y-%m-%d %H:%M:%S')"
            git push
            pip install modelscope==1.37.1
            python ../restart.py --token $MS_TOKEN
          else
            echo "Files are the same, no changes."
          fi
